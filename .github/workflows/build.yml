name: Build Vido Food Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable

      - name: Install deps
        run: flutter pub get

      - name: Inject google-services.json (from repo secret, never committed)
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > android/app/google-services.json

      - name: Build APK (release, debug-signed for sideload testing)
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk vido-food-flutter.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Vido Food (Flutter) — build ${{ github.run_number }}
          body: |
            Vido Food POS + Kiosk (Flutter), Android APK — build ${{ github.run_number }}.
            Install: open the APK on Android → allow "install from this source" → Install.
            Stable link: https://github.com/${{ github.repository }}/releases/latest/download/vido-food-flutter.apk
          files: vido-food-flutter.apk
          make_latest: true
